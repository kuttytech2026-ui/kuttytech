<!DOCTYPE html>
<html>
<head>
<title>KuttyTech Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
margin:0;
background:#f1f3f6;
}

header{
background:#2874f0;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search{
width:50%;
}

.search input{
width:100%;
padding:8px;
border:none;
border-radius:3px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:6px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.price{
color:green;
font-weight:bold;
}

button{
background:#ff9f00;
border:none;
padding:10px;
color:white;
margin-top:10px;
cursor:pointer;
border-radius:4px;
}
</style>
</head>

<body>

<header>
<div class="logo">KuttyTech Store</div>
<div class="search">
<input type="text" placeholder="Search for products...">
</div>
</header>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Smart Watch</h3>
<p class="price">₹999</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Wireless Earbuds</h3>
<p class="price">₹799</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Bluetooth Speaker</h3>
<p class="price">₹699</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Gaming Mouse</h3>
<p class="price">₹499</p>
<button>Add to Cart</button>
</div>

</div>

</body>
</html>
